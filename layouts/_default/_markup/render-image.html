{{- $imageURL := .Destination -}}
{{- if not (or (hasPrefix .Destination "http://") (hasPrefix .Destination "https://") (hasPrefix .Destination "//") (hasPrefix .Destination .Page.Site.Home.RelPermalink)) -}}
  {{- $imageURL = .Destination | replaceRE "^/" "" | relURL -}}
{{- end -}}
<img src="{{ $imageURL | safeURL }}" alt="{{ .Text }}"{{ with .Title }} title="{{ . }}"{{ end }} loading="lazy">
